name: Build Flatpak

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (rustup)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev \
            libadwaita-1-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libgdk-pixbuf-2.0-dev \
            libgraphene-1.0-dev \
            librsvg2-dev \
            flatpak-builder \
            elfutils

      - name: Build release
        run: |
          cd manga-translator-gtk
          cargo build --release

      - name: Add GNOME runtime remote
        run: |
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install GNOME SDK runtime
        run: |
          flatpak install --user -y flathub org.gnome.Sdk//50 org.gnome.Platform//50

      - name: Build Flatpak
        run: |
          cd flatpak
          flatpak-builder \
            --user \
            --disable-rofiles-fuse \
            --force-clean \
            --repo=repo \
            build-dir \
            io.github.manga_translator_gtk.yaml

      - name: Create .flatpak bundle
        run: |
          cd flatpak
          VERSION="${GITHUB_REF_NAME:-0.0.0}"
          BUNDLE="MangaTranslator-${VERSION}-x86_64.flatpak"
          flatpak build-bundle repo "${BUNDLE}" io.github.manga_translator_gtk
          mkdir -p ../dist
          mv "${BUNDLE}" ../dist/
          echo "Created ${BUNDLE} ($(du -h ../dist/${BUNDLE} | cut -f1))"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: manga-translator-flatpak-x86_64
          path: dist/*.flatpak

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.flatpak
