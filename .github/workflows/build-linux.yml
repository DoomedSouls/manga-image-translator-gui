name: Build Linux

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libadwaita-1-dev \
            gettext \
            libcairo2-dev \
            libpango1.0-dev \
            libgdk-pixbuf-2.0-dev \
            libgraphene-1.0-dev \
            librsvg2-dev \
            appstream-util

      - name: Build release
        run: |
          cd manga-translator-gtk
          cargo build --release

      - name: Extract version from Cargo.toml
        run: |
          VERSION="$(grep '^version = ' manga-translator-gtk/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Build AppImage
        run: |
          chmod +x build-appimage.sh
          ./build-appimage.sh --skip-build

      - name: Rename AppImage with version
        run: |
          ARCH="$(uname -m)"
          SRC="dist/manga-translator-gtk-${VERSION}-${ARCH}.AppImage"
          if [ -f "$SRC" ]; then
            echo "AppImage found: ${SRC}"
            ls -lh "$SRC"
          else
            echo "::error::AppImage not found at ${SRC}"
            ls -lR dist/ || true
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: manga-translator-gtk-linux-x86_64
          path: dist/*.AppImage

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.AppImage
