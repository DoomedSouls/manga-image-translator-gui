name: Build Linux

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libadwaita-1-dev \
            gettext \
            libcairo2-dev \
            libpango1.0-dev \
            libgdk-pixbuf-2.0-dev \
            libgraphene-1.0-dev \
            librsvg2-dev \
            appstream-util

      # NOTE: AppImage build moved to build-appimage.yml (openSUSE-based).
      # This workflow validates that the project compiles on Ubuntu.

      - name: Build release
        run: |
          cd manga-translator-gtk
          cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: manga-translator-gtk-linux-x86_64
          path: manga-translator-gtk/target/release/manga-translator-gtk

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: manga-translator-gtk/target/release/manga-translator-gtk
