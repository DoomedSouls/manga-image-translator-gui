app-id: io.github.manga_translator_gtk
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
command: manga-translator-gtk

finish-args:
  # GPU acceleration
  - --device=dri
  # X11 / Wayland
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  # Translation APIs (DeepL, OpenRouter, etc.)
  - --share=network
  # Access to manga directories and Python venv
  - --filesystem=home
  # Spawn host processes (Python backend via flatpak-spawn --host)
  - --talk-name=org.freedesktop.Flatpak

build-options:
  env:
    CARGO_HOME: /run/build/manga-translator-gtk/cargo
    RUST_BACKTRACE: "1"

modules:
  # ── Rust toolchain (installed into /app) ──────────────────────────
  - name: rust
    buildsystem: simple
    cleanup:
      - /share/doc
      - /share/man
    sources:
      - type: archive
        url: https://static.rust-lang.org/dist/rust-1.87.0-x86_64-unknown-linux-gnu.tar.xz
        sha256: 9720bf4ffdd5e6112f8fc93a645d50bfdc64f95cb76d41561be196e1721b4b69
        only-arches:
          - x86_64
    build-commands:
      - ./install.sh --prefix=/app --disable-ldconfig --verbose

  # ── Application ───────────────────────────────────────────────────
  - name: manga-translator-gtk
    buildsystem: simple
    build-options:
      prepend-path: /app/bin
      prepend-ld-library-path: /app/lib
    build-commands:
      # Build Rust binary (offline — crate sources from cargo-sources.json)
      - cargo --offline build --release --manifest-path manga-translator-gtk/Cargo.toml

      # Install binary
      - install -Dm755 manga-translator-gtk/target/release/manga-translator-gtk
        ${FLATPAK_DEST}/bin/manga-translator-gtk

      # Desktop file (renamed to app-id for Flatpak convention)
      - install -Dm644 packaging/manga-translator-gtk.desktop
        ${FLATPAK_DEST}/share/applications/io.github.manga_translator_gtk.desktop

      # Icon
      - install -Dm644 packaging/manga-translator-gtk.svg
        ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/manga-translator-gtk.svg

      # AppStream metainfo
      - install -Dm644 packaging/metainfo/io.github.manga_translator_gtk.appdata.xml
        ${FLATPAK_DEST}/share/metainfo/io.github.manga_translator_gtk.appdata.xml

      # Python backend
      - install -Dm644 manga-translator-gtk/backend/server.py
        ${FLATPAK_DEST}/share/manga-translator-gtk/backend/server.py

      # Locale (.mo files)
      - |
        for po_dir in locale/*/LC_MESSAGES; do
          lang="$(basename "$(dirname "$po_dir")")"
          for mo in "${po_dir}"/*.mo; do
            [ -f "$mo" ] || continue
            install -Dm644 "$mo" \
              ${FLATPAK_DEST}/share/locale/${lang}/LC_MESSAGES/$(basename "$mo")
          done
        done

    sources:
      - type: dir
        path: ..
      - cargo-sources.json
